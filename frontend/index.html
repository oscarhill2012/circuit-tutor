<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuit Tutor — Genesis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="stylesheet" href="src/styles/base.css">
<link rel="stylesheet" href="src/styles/layout.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<!-- Physics solver: classic script exposing window.Physics, loaded before modules. -->
<script src="src/sim/physics.js"></script>
</head>
<body>

<div class="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>Circuit Tutor</h1>
      <span class="tag">GCSE · Professor Volt</span>
    </div>
    <div class="right">
      <span class="badge ai" title="AI transparency">● AI Tutor On</span>
      <button class="iconbtn" id="btn-open-tasks">Tasks</button>
      <button class="iconbtn" id="btn-help">Help</button>
    </div>
  </div>

  <!-- Palette -->
  <div class="palette">
    <h3>Components</h3>
    <div class="parts" id="parts"></div>
    <h3>Tools</h3>
    <div class="tools">
      <button data-tool="select" class="active">Select</button>
      <button data-tool="wire">Wire</button>
      <button data-tool="delete">Delete</button>
      <button id="btn-undo" title="Ctrl+Z">Undo</button>
      <button id="btn-redo" title="Ctrl+Y">Redo</button>
      <button id="btn-clear">Clear</button>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap">
    <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
    <!-- Floating active-task widget. Populated by tasks/engine.js when a
         measure or exploration task is picked. Hidden for scenario tasks
         (Professor Volt drives those entirely) and in sandbox mode. The
         old description/header chrome has moved to the tutor panel. -->
    <div class="task-widget hidden" id="task-widget">
      <div class="task-card" id="task-card"></div>
    </div>
  </div>

  <!-- Right column: tutor only. Task selection lives in the central modal. -->
  <div class="rightcol">
    <div class="tutor">
      <div class="hd">
        <div class="persona">
          <div class="persona-avatar">V</div>
          <div>
            <div class="persona-name">Professor Volt</div>
          </div>
        </div>
        <button class="iconbtn" id="btn-clear-chat">Clear</button>
      </div>
      <div class="messages" id="messages"></div>
      <div class="tutor-quick">
        <button data-action="remind">Task reminder</button>
        <button data-action="hint">Ask for a hint</button>
        <button data-action="check">Check my circuit</button>
      </div>
      <div class="tutor-input">
        <input id="chat-input" placeholder="Ask Professor Volt…" />
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Central task-loader modal. Shown on first load and whenever a task
     completes. Grouped list + search + filters + selected-task preview. -->
<div class="modal hidden" id="task-modal">
  <div class="task-picker">
    <header class="tp-head">
      <div class="tp-title">
        <h2>Choose a task</h2>
        <p class="tp-sub">Pick something to work on, or explore freely in sandbox mode.</p>
      </div>
      <div class="tp-progress">
        <div class="tp-progress-meta">
          <span class="tp-progress-label" id="tp-progress-label">0 / 0 complete</span>
          <span class="tp-progress-pct" id="tp-progress-pct">0%</span>
        </div>
        <div class="tp-progress-bar"><div class="tp-progress-fill" id="tp-progress-fill"></div></div>
      </div>
      <div class="tp-actions">
        <button class="iconbtn" id="btn-sandbox">Sandbox mode</button>
      </div>
    </header>

    <div class="tp-controls">
      <input id="tp-search" placeholder="Search tasks…" autocomplete="off" />
      <div class="tp-filter-row">
        <div class="tp-filter-group" data-filter="type">
          <button data-val="all" class="active">All types</button>
          <button data-val="measure">Measure</button>
          <button data-val="problem">Problem</button>
          <button data-val="scenario">Scenario</button>
          <button data-val="exploration">Explore</button>
        </div>
        <div class="tp-filter-group" data-filter="difficulty">
          <button data-val="all" class="active">Any level</button>
          <button data-val="beginner">Beginner</button>
          <button data-val="intermediate">Intermediate</button>
          <button data-val="advanced">Advanced</button>
          <button data-val="expert">Expert</button>
        </div>
        <button class="tp-chip" id="tp-recommended-btn" title="Jump to the next recommended task">★ Recommended</button>
      </div>
    </div>

    <div class="tp-body">
      <div class="tp-groups" id="tp-groups"></div>
      <aside class="tp-preview" id="tp-preview">
        <div class="tp-preview-empty">Select a task to see details</div>
      </aside>
    </div>
  </div>
</div>

<!-- Tutor API key is held server-side as an env var on Vercel; no in-browser modal. -->

<!-- Mount point for the first-launch onboarding tour overlay. Sits at
     body level (NOT inside .app) so it doesn't consume an .app grid cell
     and bump .rightcol onto a new row. The overlay is position:fixed so
     visual placement is unaffected by where in the DOM it lives. -->
<div id="onboarding-root"></div>

<script type="module" src="src/main.js"></script>
</body>
</html>
