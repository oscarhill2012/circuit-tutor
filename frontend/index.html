<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuit Tutor — Genesis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="stylesheet" href="src/styles/base.css">
<link rel="stylesheet" href="src/styles/layout.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<!-- Physics solver: classic script exposing window.Physics, loaded before modules. -->
<script src="src/sim/physics.js"></script>
</head>
<body>

<div class="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>Circuit Tutor</h1>
      <span class="tag">GCSE · Professor Volt</span>
    </div>
    <div class="right">
      <span class="badge ai" title="AI transparency">● AI Tutor On</span>
      <button class="iconbtn" id="btn-help">Help</button>
    </div>
  </div>

  <!-- Palette -->
  <div class="palette">
    <h3>Components</h3>
    <div class="parts" id="parts"></div>
    <h3>Tools</h3>
    <div class="tools">
      <button data-tool="select" class="active">Select</button>
      <button data-tool="wire">Wire</button>
      <button data-tool="delete">Delete</button>
      <button id="btn-undo" title="Ctrl+Z">Undo</button>
      <button id="btn-redo" title="Ctrl+Y">Redo</button>
      <button id="btn-clear">Clear</button>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap">
    <div class="canvas-hud">
      <div class="chip" id="circuit-state">Circuit: <b>empty</b></div>
      <div class="chip" id="tool-hint">Drag a cell and a bulb onto the board, then connect them with wires</div>
    </div>
    <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="toggles">
      <div class="toggle on" data-toggle="current">Show current</div>
      <div class="toggle on" data-toggle="voltage">Show voltage</div>
      <div class="toggle on" data-toggle="labels">Show labels</div>
    </div>
    <div class="readout" id="readout">
      <h4>Live readings</h4>
      <div class="row"><span>Status</span><b id="ro-status">—</b></div>
      <div class="row"><span>Supply V</span><b id="ro-vs">—</b></div>
      <div class="row"><span>Total I</span><b id="ro-it">—</b></div>
      <div class="row"><span>Selected</span><b id="ro-sel">—</b></div>
    </div>
  </div>

  <!-- Right column: tasks + tutor -->
  <div class="rightcol">
    <div class="tasks">
      <div class="hd">
        <h3>Task</h3>
        <div style="display:flex; gap:6px;">
          <button class="iconbtn" id="btn-prev-task">‹</button>
          <button class="iconbtn" id="btn-next-task">›</button>
        </div>
      </div>
      <div class="progress"><div id="prog-bar"></div></div>
      <div class="task-card" id="task-card"></div>
    </div>
    <div class="tutor">
      <div class="hd">
        <div class="persona">
          <div class="persona-avatar">V</div>
          <div>
            <div class="persona-name">Professor Volt</div>
            <div class="persona-role">Socratic GCSE circuits tutor</div>
          </div>
        </div>
        <button class="iconbtn" id="btn-clear-chat">Clear</button>
      </div>
      <div class="messages" id="messages"></div>
      <div class="tutor-quick">
        <button data-quick="hint">Give me a hint</button>
        <button data-quick="check">Check my circuit</button>
        <button data-quick="explain">Explain this topic</button>
      </div>
      <div class="tutor-input">
        <input id="chat-input" placeholder="Ask Professor Volt…" />
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Tutor API key is held server-side as an env var on Vercel; no in-browser modal. -->

<script type="module" src="src/main.js"></script>
</body>
</html>
